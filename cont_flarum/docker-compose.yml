services:
  flarum:
    image: mondedie/docker-flarum:stable
    container_name: flarum
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - FORUM_URL=https://flarum.domain.com
      - DB_HOST=mariadb
      - DB_NAME=flarum
      - DB_USER=flarum
      - DB_PASS=mypassword
      - VIRTUAL_HOST=flarum.domain.com
      - LETSENCRYPT_HOST=flarum.domain.com
      - LETSENCRYPT_EMAIL=toto@yopmail.fr
    volumes:
      - ./assets:/flarum/app/assets
      - ./extensions:/flarum/app/extensions
    networks:
      - default
      - webproxy

  mariadb:
    image: mariadb:11
    container_name: flarum-mariadb
    restart: unless-stopped
    volumes:
      - ./db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=mypassword
      - MYSQL_DATABASE=flarum
      - MYSQL_USER=flarum
      - MYSQL_PASSWORD=mypassword

networks:
  webproxy:
    external: true
